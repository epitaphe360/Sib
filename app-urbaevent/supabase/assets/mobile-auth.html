<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion UrbaEvent</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 24px; color: #1B365D; }
    .card { max-width: 420px; margin: 48px auto; background: #fff; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { color: #555; line-height: 1.5; }
    a.btn { display: inline-block; margin-top: 16px; background: #1B365D; color: #fff; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e8ecf0; border-top-color: #1B365D; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="spinner"></div>
    <h1>Ouverture de UrbaEvent…</h1>
    <p>Redirection vers l'application en cours.</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var card = document.getElementById('content');
      var error = params.get('error_description') || params.get('error') || hashParams.get('error_description');

      if (error) {
        card.innerHTML = '<h1>Erreur</h1><p>' + error + '</p><p>Demandez un nouveau lien depuis l\'application UrbaEvent.</p>';
        return;
      }

      var tokenHash = params.get('token_hash');
      var otpType = params.get('type') || hashParams.get('type') || 'magiclink';
      var accessToken = hashParams.get('access_token') || params.get('access_token');
      var refreshToken = hashParams.get('refresh_token') || params.get('refresh_token');
      var code = params.get('code') || hashParams.get('code');
      var target = 'urbaevent://auth-callback';

      if (tokenHash) {
        target += '?token_hash=' + encodeURIComponent(tokenHash) + '&type=' + encodeURIComponent(otpType);
      } else if (accessToken && refreshToken) {
        target += '?access_token=' + encodeURIComponent(accessToken)
          + '&refresh_token=' + encodeURIComponent(refreshToken)
          + '&type=' + encodeURIComponent(otpType);
      } else if (code) {
        target += '?code=' + encodeURIComponent(code);
      } else {
        card.innerHTML = '<h1>Lien invalide</h1><p>Ce lien est expiré. Demandez un nouveau lien depuis l\'application UrbaEvent.</p>';
        return;
      }

      function showManualLink() {
        card.innerHTML =
          '<h1>Ouvrir UrbaEvent</h1>' +
          '<p>Appuyez sur le bouton pour ouvrir l\'application.</p>' +
          '<a class="btn" href="' + target + '">Ouvrir UrbaEvent</a>';
      }

      window.location.replace(target);
      setTimeout(showManualLink, 2500);
    })();
  </script>
</body>
</html>

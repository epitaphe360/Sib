# Nixpacks Configuration for SIB 2026 Web Application
# Toutes les variables sont injectées ici pour un déploiement 100% automatique
# Railway/Nixpacks expose ces variables dans process.env au build et au runtime

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm ci --prefer-offline --no-audit --loglevel=error || npm install --prefer-offline --no-audit"
]

[phases.build]
cmds = [
  "npm run build"
]

[phases.build.envVars]

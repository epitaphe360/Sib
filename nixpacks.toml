# Nixpacks Configuration for SIB 2026 — Backend API server (Railway)
# Frontend is deployed on Vercel separately
# Railway runs only the Express API server (server.js)

[phases.setup]
nixPkgs = ["nodejs_20"]
providers = ["node"]

[phases.install]
cmds = [
  "npm ci --prefer-offline --no-audit --omit=dev --loglevel=error || npm install --prefer-offline --no-audit --omit=dev"
]

# No build phase needed — Railway is API-only, no Vite build required
[phases.build]
cmds = ["echo 'No build needed - API only'"]

[start]
cmd = "node server.js"
